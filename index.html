<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bankroll Pro — Gestión de Tipster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0B0F14; --surface:#131920; --surface-alt:#1B232C; --surface-hi:#212B35;
  --border:#26313C; --text:#E8ECEF; --muted:#8B96A3; --muted-2:#5C6773;
  --gold:#C9A227; --gold-soft:#E8C766; --teal:#2DD4BF;
  --pos:#22C55E; --neg:#EF4444; --warn:#F59E0B; --neutral:#64748B;
  --radius:10px; --radius-sm:6px;
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
}
[data-theme="light"]{
  --bg:#F3F4F1; --surface:#FFFFFF; --surface-alt:#F6F7F5; --surface-hi:#EDEEEA;
  --border:#DDE0DA; --text:#171A1D; --muted:#5B6169; --muted-2:#8A909A;
  --gold:#A9800F; --gold-soft:#C9A227; --teal:#0E8C7F;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
::selection{background:var(--gold); color:#0B0F14;}
::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:var(--surface-hi); border-radius:8px;}
h1,h2,h3,h4{font-family:var(--font-display); font-weight:600; letter-spacing:-0.01em;}
.mono{font-family:var(--font-mono);}
button{font-family:var(--font-body); cursor:pointer;}
input,select,textarea{font-family:var(--font-body); background:var(--surface-alt); border:1px solid var(--border); color:var(--text); border-radius:var(--radius-sm); padding:8px 10px; font-size:13px; width:100%;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold);}
label{font-size:11.5px; color:var(--muted); display:block; margin-bottom:4px; font-weight:500; text-transform:uppercase; letter-spacing:.03em;}
.field{margin-bottom:12px;}
.grid{display:grid; gap:12px;}
.grid-2{grid-template-columns:1fr 1fr;} .grid-3{grid-template-columns:repeat(3,1fr);} .grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:720px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

/* Layout */
.app{display:flex; min-height:100vh;}
.sidebar{width:230px; background:var(--surface); border-right:1px solid var(--border); position:fixed; top:0; left:0; bottom:0; display:flex; flex-direction:column; z-index:40; transition:transform .2s;}
.sidebar-brand{padding:20px 18px 16px; border-bottom:1px solid var(--border);}
.sidebar-brand .name{font-family:var(--font-display); font-size:16px; font-weight:700; letter-spacing:-.02em;}
.sidebar-brand .tag{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:2px;}
.nav{flex:1; overflow-y:auto; padding:10px;}
.nav button{display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent; border:none; color:var(--muted); padding:9px 12px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; margin-bottom:2px;}
.nav button:hover{background:var(--surface-alt); color:var(--text);}
.nav button.active{background:var(--surface-hi); color:var(--gold-soft); box-shadow:inset 2px 0 0 var(--gold);}
.nav .icon{width:16px; text-align:center; opacity:.85; font-size:14px;}
.sidebar-foot{padding:12px; border-top:1px solid var(--border); display:flex; gap:8px;}
.theme-toggle{flex:1; background:var(--surface-alt); border:1px solid var(--border); color:var(--text); border-radius:var(--radius-sm); padding:8px; font-size:12px; font-weight:600;}
.main{margin-left:230px; flex:1; min-width:0;}
.topbar{position:sticky; top:0; background:rgba(11,15,20,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); padding:14px 26px; display:flex; align-items:center; justify-content:space-between; z-index:30;}
[data-theme="light"] .topbar{background:rgba(243,244,241,.85);}
.topbar h1{font-size:19px;}
.menu-btn{display:none; background:none; border:none; color:var(--text); font-size:20px;}
.content{padding:22px 26px 60px;}
.disclaimer{background:var(--surface-alt); border:1px solid var(--border); border-left:3px solid var(--gold); color:var(--muted); font-size:11.5px; padding:9px 14px; border-radius:var(--radius-sm); margin-bottom:18px;}
.tabpanel{display:none;}
.tabpanel.active{display:block; animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(3px);} to{opacity:1; transform:translateY(0);}}

/* Cards */
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px;}
.kpi{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; position:relative; overflow:hidden;}
.kpi .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; font-weight:600; margin-bottom:6px;}
.kpi .val{font-family:var(--font-mono); font-size:22px; font-weight:700;}
.kpi .sub{font-size:11px; color:var(--muted-2); margin-top:4px;}
.kpi.accent{border-color:var(--gold); box-shadow:0 0 0 1px rgba(201,162,39,.15) inset;}
.pos{color:var(--pos);} .neg{color:var(--neg);} .warn-c{color:var(--warn);} .gold-c{color:var(--gold-soft);}

/* Ticket hero */
.ticket{background:linear-gradient(135deg,var(--surface-hi),var(--surface)); border:1px solid var(--border); border-radius:var(--radius); padding:22px 24px; position:relative; margin-bottom:20px; overflow:hidden;}
.ticket::before,.ticket::after{content:"";position:absolute; width:22px; height:22px; background:var(--bg); border-radius:50%; top:50%; transform:translateY(-50%);}
.ticket::before{left:-11px;} .ticket::after{right:-11px;}
.ticket-row{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px; border-top:1px dashed var(--border); margin-top:14px; padding-top:14px;}
.ticket-title{font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--gold-soft); font-weight:700;}
.ticket-amt{font-family:var(--font-mono); font-size:34px; font-weight:700; letter-spacing:-.02em;}
.ticket-stub{text-align:right;}
.ticket-stub .l{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
.ticket-stub .v{font-family:var(--font-mono); font-size:15px; font-weight:600;}

/* Buttons */
.btn{background:var(--surface-alt); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:var(--radius-sm); font-size:12.5px; font-weight:600;}
.btn:hover{border-color:var(--gold);}
.btn-gold{background:var(--gold); border-color:var(--gold); color:#14100a;}
.btn-gold:hover{background:var(--gold-soft);}
.btn-danger{color:var(--neg); border-color:var(--neg);}
.btn-sm{padding:5px 9px; font-size:11.5px;}
.btn-row{display:flex; gap:8px; flex-wrap:wrap;}

/* Table */
.table-wrap{overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius);}
table{width:100%; border-collapse:collapse; font-size:12.5px; min-width:1100px;}
th{text-align:left; background:var(--surface-alt); color:var(--muted); font-weight:600; text-transform:uppercase; font-size:10.5px; letter-spacing:.04em; padding:9px 10px; border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer;}
td{padding:8px 10px; border-bottom:1px solid var(--border); white-space:nowrap;}
tbody tr:hover{background:var(--surface-alt);}
.badge{display:inline-block; padding:2px 8px; border-radius:20px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em;}
.badge-ganada{background:rgba(34,197,94,.15); color:var(--pos);}
.badge-perdida{background:rgba(239,68,68,.15); color:var(--neg);}
.badge-pendiente{background:rgba(245,158,11,.15); color:var(--warn);}
.badge-nula{background:rgba(100,116,139,.18); color:#cbd3db;}
.badge-media_ganada{background:rgba(45,212,191,.15); color:var(--teal);}
.badge-media_perdida{background:rgba(239,68,68,.1); color:#e88;}
.badge-cash_out{background:rgba(45,212,191,.18); color:var(--teal);}

/* Modal */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:flex-start; justify-content:center; z-index:100; padding:30px 14px; overflow-y:auto;}
.overlay.active{display:flex;}
.modal{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:100%; max-width:640px; padding:22px;}
.modal h2{font-size:17px; margin-bottom:16px;}
.modal-close{float:right; background:none; border:none; color:var(--muted); font-size:18px;}

/* misc */
.section-title{font-size:15px; margin:22px 0 12px; display:flex; align-items:center; gap:8px;}
.section-title:first-child{margin-top:0;}
.empty{text-align:center; padding:40px 20px; color:var(--muted);}
.empty .big{font-size:30px; margin-bottom:8px;}
.chart-box{position:relative; height:280px;}
.chart-box.small{height:200px;}
.filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
.filters input,.filters select{width:auto; min-width:120px;}
.tag{background:var(--surface-hi); border:1px solid var(--border); padding:5px 11px; border-radius:20px; font-size:11.5px; font-weight:600; color:var(--muted); cursor:pointer;}
.tag.active{border-color:var(--gold); color:var(--gold-soft);}
.tooltip-i{display:inline-flex; width:14px; height:14px; border-radius:50%; background:var(--surface-hi); color:var(--muted); font-size:10px; align-items:center; justify-content:center; cursor:help; margin-left:4px;}
.alert{padding:10px 14px; border-radius:var(--radius-sm); font-size:12.5px; margin-bottom:8px; border-left:3px solid; display:flex; gap:10px; align-items:flex-start;}
.alert-warn{background:rgba(245,158,11,.08); border-color:var(--warn); color:#f0c584;}
.alert-danger{background:rgba(239,68,68,.08); border-color:var(--neg); color:#f0a1a1;}
.alert-info{background:rgba(45,212,191,.08); border-color:var(--teal); color:#9fe7dd;}
.calendar{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-cell{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); min-height:64px; padding:6px; font-size:11px; cursor:pointer;}
.cal-cell.empty-c{background:transparent; border:none; cursor:default;}
.cal-cell .d{font-weight:700; font-family:var(--font-mono); font-size:12px;}
.cal-cell.pos-day{border-color:var(--pos); background:rgba(34,197,94,.07);}
.cal-cell.neg-day{border-color:var(--neg); background:rgba(239,68,68,.07);}
.cal-cell.pend-day{border-color:var(--warn); background:rgba(245,158,11,.07);}
.toast-wrap{position:fixed; bottom:18px; right:18px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--surface-hi); border:1px solid var(--gold); color:var(--text); padding:10px 16px; border-radius:var(--radius-sm); font-size:12.5px; box-shadow:0 8px 24px rgba(0,0,0,.3); animation:fadein .2s;}
.pill-list{display:flex; gap:6px; flex-wrap:wrap;}
.pill-x{background:var(--surface-hi); border:1px solid var(--border); border-radius:20px; padding:4px 8px 4px 11px; font-size:11.5px; display:flex; align-items:center; gap:6px;}
.pill-x button{background:none; border:none; color:var(--muted); font-size:13px;}
.loading-screen{position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; z-index:500; color:var(--muted); font-family:var(--font-mono); font-size:12px;}
.spinner{width:22px; height:22px; border:2px solid var(--surface-hi); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hidden{display:none !important;}
.risk-bar{height:8px; background:var(--surface-alt); border-radius:6px; overflow:hidden; margin-top:6px;}
.risk-bar-fill{height:100%; border-radius:6px;}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);} .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;} .menu-btn{display:block;}
}
</style>
</head>
<body data-theme="dark">

<div class="loading-screen" id="loadingScreen"><div class="spinner"></div><div>Cargando bankroll…</div></div>

<div class="app hidden" id="appRoot">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="name" id="brandName">Bankroll Pro</div>
      <div class="tag" id="brandTag">Panel del Tipster</div>
    </div>
    <nav class="nav" id="navMenu"></nav>
    <div class="sidebar-foot">
      <button class="theme-toggle" id="themeToggle">🌙 Modo oscuro</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <h1 id="pageTitle">Resumen general</h1>
      </div>
      <div class="btn-row">
        <button class="btn" id="btnBackup">Copia de seguridad</button>
        <button class="btn btn-gold" id="btnNewBet">+ Nueva apuesta</button>
      </div>
    </div>
    <div class="content">
      <div class="disclaimer">⚠️ Las apuestas deportivas implican riesgo financiero. Los resultados pasados no garantizan resultados futuros. Esta herramienta está diseñada para registrar y analizar información, no para garantizar ganancias.</div>
      <div id="panels"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modalBody"></div></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ============================= STORAGE ============================= */
const STORE_KEY='tipster-app-data-v1';
let DATA=null;
let CHARTS={};

function defaultData(){
  return {
    config:{
      nombre:'Mi Proyecto Tipster', moneda:'COP', bankrollInicial:2000000,
      fechaInicio:new Date().toISOString().slice(0,10), valorUnidad:20000,
      metodoUnidad:'fijo', porcentajeUnidad:1, bankrollObjetivo:5000000,
      limiteApuestaPct:5, limitePerdidaDiariaPct:10, limitePerdidaSemanalPct:20,
      drawdownAlertaPct:25, rachaPerdidasAlerta:4,
      deportes:['Fútbol','Baloncesto','Tenis'], casas:['Bet365','Betplay','Wplay']
    },
    bets:[], movements:[], diary:[], picks:[],
    ui:{theme:'dark', demoSeeded:false}
  };
}

async function loadData(){
  try{
    const r=await localStorage.getItem(STORE_KEY,false);
    if(r && r.value){ DATA=JSON.parse(r.value); return; }
  }catch(e){ /* not found */ }
  DATA=defaultData();
  seedDemoData();
  await saveData();
}
let saveTimer=null;
async function saveData(){
  clearTimeout(saveTimer);
  return new Promise(res=>{
    saveTimer=setTimeout(async()=>{
      try{ await localStorage.setItem(STORE_KEY, JSON.stringify(DATA), false); }
      catch(e){ console.error('Error guardando',e); toast('⚠️ Error al guardar los datos'); }
      res();
    },150);
  });
}

/* ============================= HELPERS ============================= */
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
function fmtMoney(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  const cur=DATA.config.moneda;
  const sign=n<0?'-':'';
  const abs=Math.abs(n);
  let str=abs.toLocaleString('es-CO',{maximumFractionDigits:0});
  const symbols={COP:'$',USD:'US$',EUR:'€'};
  return sign+(symbols[cur]||cur+' ')+str;
}
function fmtPct(n,dec=2){ if(n===null||n===undefined||isNaN(n)) return '—'; return (n>0?'+':'')+n.toFixed(dec)+'%'; }
function fmtNum(n,dec=2){ if(n===null||n===undefined||isNaN(n)) return '—'; return n.toFixed(dec); }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function toast(msg){
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================= CALC ENGINE ============================= */
function calcularApuesta(b){
  const stake=Number(b.stake)||0, cuota=Number(b.cuota)||0;
  let ganancia=0, retorno=0;
  switch(b.estado){
    case 'pendiente': return {ganancia:null, retorno:null};
    case 'ganada': retorno=stake*cuota; ganancia=retorno-stake; break;
    case 'perdida': ganancia=-stake; retorno=0; break;
    case 'nula': ganancia=0; retorno=stake; break;
    case 'media_ganada':{
      const half=stake/2; const retW=half*cuota;
      ganancia=(retW-half); retorno=retW+half; break;
    }
    case 'media_perdida':{
      const half=stake/2; ganancia=-half; retorno=half; break;
    }
    case 'cash_out':{
      const vr=Number(b.valorRecibido)||0; ganancia=vr-stake; retorno=vr; break;
    }
    default: ganancia=0; retorno=0;
  }
  return {ganancia, retorno};
}
function valorUnidadActual(){
  const c=DATA.config;
  if(c.metodoUnidad==='porcentaje'){ return bankrollActual()*(c.porcentajeUnidad/100); }
  return Number(c.valorUnidad)||1;
}
function movimientosNeto(){
  return DATA.movements.reduce((s,m)=>{
    const v=Number(m.monto)||0;
    return s + (m.tipo==='retiro'? -v : v);
  },0);
}
function apuestasResueltas(){ return DATA.bets.filter(b=>b.estado!=='pendiente'); }
function gananciaNetaTotal(){ return apuestasResueltas().reduce((s,b)=>s+(Number(b.gananciaNeta)||0),0); }
function bankrollActual(){ return (Number(DATA.config.bankrollInicial)||0) + movimientosNeto() + gananciaNetaTotal(); }
function totalApostado(){ return apuestasResueltas().reduce((s,b)=>s+(Number(b.stake)||0),0); }
function totalGanado(){ return apuestasResueltas().filter(b=>(b.gananciaNeta||0)>0).reduce((s,b)=>s+b.gananciaNeta,0); }
function totalPerdido(){ return Math.abs(apuestasResueltas().filter(b=>(b.gananciaNeta||0)<0).reduce((s,b)=>s+b.gananciaNeta,0)); }
function roi(){ const ta=totalApostado(); return ta? (gananciaNetaTotal()/ta*100):0; }
function rentabilidadInicial(){ const bi=Number(DATA.config.bankrollInicial)||1; return gananciaNetaTotal()/bi*100; }
function unidadesGP(){ const vu=valorUnidadActual()||1; return gananciaNetaTotal()/vu; }
function unidadesApostadas(){ const vu=valorUnidadActual()||1; return totalApostado()/vu; }
function yieldPct(){ const ua=unidadesApostadas(); return ua? (unidadesGP()/ua*100):0; }
function pctAcierto(){
  const resueltas=apuestasResueltas().filter(b=>b.estado!=='nula');
  const ganadas=resueltas.filter(b=>['ganada','media_ganada','cash_out'].includes(b.estado) && (b.gananciaNeta||0)>0);
  return resueltas.length? (ganadas.length/resueltas.length*100):0;
}
function profitFactor(){ const tp=totalGanado(), tl=totalPerdido(); return tl? tp/tl : (tp?Infinity:0); }
function cuotaPromedio(){ const r=apuestasResueltas(); return r.length? r.reduce((s,b)=>s+Number(b.cuota),0)/r.length : 0; }
function cuotaPromedioPonderada(){
  const r=apuestasResueltas(); const ts=r.reduce((s,b)=>s+Number(b.stake),0);
  return ts? r.reduce((s,b)=>s+Number(b.cuota)*Number(b.stake),0)/ts : 0;
}
function bankrollComprometido(){ return DATA.bets.filter(b=>b.estado==='pendiente').reduce((s,b)=>s+(Number(b.stake)||0),0); }

function bankrollSeries(){
  const events=[];
  DATA.movements.forEach(m=>events.push({fecha:m.fecha, delta:(m.tipo==='retiro'?-1:1)*(Number(m.monto)||0), t:new Date(m.fecha).getTime()}));
  apuestasResueltas().forEach(b=>events.push({fecha:b.fechaResolucion||b.fecha, delta:Number(b.gananciaNeta)||0, t:new Date(b.fechaResolucion||b.fecha).getTime()}));
  events.sort((a,b)=>a.t-b.t);
  let running=Number(DATA.config.bankrollInicial)||0;
  const series=[{fecha:DATA.config.fechaInicio, valor:running}];
  events.forEach(e=>{ running+=e.delta; series.push({fecha:e.fecha, valor:running}); });
  return series;
}
function maxDrawdown(){
  const s=bankrollSeries(); let peak=s[0]?s[0].valor:0, maxDD=0, maxDDpct=0, peakVal=peak;
  s.forEach(p=>{
    if(p.valor>peak){ peak=p.valor; }
    const dd=peak-p.valor; const ddpct=peak? dd/peak*100:0;
    if(dd>maxDD){ maxDD=dd; maxDDpct=ddpct; }
  });
  return {maxDD, maxDDpct};
}
function bankrollMaxMin(){
  const s=bankrollSeries().map(p=>p.valor);
  return {max:Math.max(...s), min:Math.min(...s)};
}
function rachas(){
  const resueltas=DATA.bets.filter(b=>b.estado!=='pendiente'&&b.estado!=='nula').sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  let best=0,worst=0,cur=0,curType=null;
  resueltas.forEach(b=>{
    const win=(b.gananciaNeta||0)>0;
    if(curType===win){ cur++; } else { cur=1; curType=win; }
    if(win) best=Math.max(best,cur); else worst=Math.max(worst,cur);
  });
  return {best, worst};
}
function rachaActualPerdidas(){
  const resueltas=[...DATA.bets].filter(b=>b.estado!=='pendiente'&&b.estado!=='nula').sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  let cur=0;
  for(const b of resueltas){ if((b.gananciaNeta||0)<0){ cur++; } else break; }
  return cur;
}

function filteredBets(){
  let list=[...DATA.bets];
  const f=betFilters;
  if(f.q) list=list.filter(b=>JSON.stringify(b).toLowerCase().includes(f.q.toLowerCase()));
  if(f.deporte) list=list.filter(b=>b.deporte===f.deporte);
  if(f.estado) list=list.filter(b=>b.estado===f.estado);
  if(f.casa) list=list.filter(b=>b.casa===f.casa);
  if(f.from) list=list.filter(b=>b.fecha>=f.from);
  if(f.to) list=list.filter(b=>b.fecha<=f.to);
  list.sort((a,b)=>{
    let va=a[betSort.col], vb=b[betSort.col];
    if(typeof va==='string') return va.localeCompare(vb)*betSort.dir;
    return ((va||0)-(vb||0))*betSort.dir;
  });
  return list;
}

    const fd=new FormData(form); const tmp={estado:fd.get('estado'), stake:Number(fd.get('stake')||0), cuota:Number(fd.get('cuota')||0), valorRecibido:Number(fd.get('valorRecibido')||0)};
    const c=calcularApuesta(tmp);
    document.getElementById('calcPreview').innerHTML = c.ganancia===null? 'Capital comprometido: <b>'+fmtMoney(tmp.stake)+'</b> (no afecta el bankroll hasta resolverse)'
      : `Ganancia/pérdida neta estimada: <b class="${c.ganancia>=0?'pos':'neg'}">${fmtMoney(c.ganancia)}</b> · Retorno total: <b>${fmtMoney(c.retorno)}</b>`;
  }
  updatePreview();
  form.addEventListener('submit',e=>{
    e.preventDefault();
    const fd=new FormData(form);
    if(Number(fd.get('cuota'))<1.01){ toast('⚠️ La cuota no puede ser inferior a 1.01'); return; }
    if(Number(fd.get('stake'))<0){ toast('⚠️ El stake no puede ser negativo'); return; }
    const nb={...b};
    for(const [k,v] of fd.entries()){ nb[k]=v; }
    nb.cuota=Number(nb.cuota); nb.stake=Number(nb.stake); nb.publicado=(nb.publicado==='true');
    nb.valorRecibido = nb.valorRecibido? Number(nb.valorRecibido): null;
    nb.cuotaCierre = nb.cuotaCierre? Number(nb.cuotaCierre): null;
    if(nb.estado!=='pendiente' && !nb.fechaResolucion) nb.fechaResolucion=nb.fecha;
    const calc=calcularApuesta(nb); nb.gananciaNeta=calc.ganancia; nb.retornoTotal=calc.retorno;
    if(editing){
      nb.editHistory=[...(editing.editHistory||[]), {ts:new Date().toISOString(), prev:{estado:editing.estado,stake:editing.stake,cuota:editing.cuota}}];
      nb.updatedAt=new Date().toISOString();
      const idx=DATA.bets.findIndex(x=>x.id===id); DATA.bets[idx]=nb;
    } else {
      nb.createdAt=new Date().toISOString();
      DATA.bets.push(nb);
    }
    saveData(); closeModal(); render(); toast(editing?'Apuesta actualizada':'Apuesta registrada');
  });
}

/* ============================= ANALISIS ============================= */
function groupBy(keyFn){
  const groups={};
  apuestasResueltas().forEach(b=>{
    const k=keyFn(b); if(!groups[k]) groups[k]={n:0,g:0,f:0,apostado:0,gp:0,cuotas:0};
    groups[k].n++; groups[k].apostado+=Number(b.stake); groups[k].gp+=(b.gananciaNeta||0); groups[k].cuotas+=Number(b.cuota);
    if(b.estado!=='nula'){ if((b.gananciaNeta||0)>0) groups[k].g++; else if((b.gananciaNeta||0)<0) groups[k].f++; }
  });
  return groups;
}
function analysisTable(title,groups){
  const rows=Object.entries(groups).sort((a,b)=>b[1].gp-a[1].gp);
  const totalStake=rows.reduce((s,r)=>s+r[1].apostado,0)||1;
  return `<div class="section-title">${title}</div>
  <div class="table-wrap"><table><thead><tr><th>Categoría</th><th>Apuestas</th><th>Aciertos</th><th>Fallos</th><th>% Acierto</th><th>Apostado</th><th>G/P</th><th>ROI</th><th>Cuota prom.</th></tr></thead><tbody>
  ${rows.length? rows.map(([k,v])=>{
    const resueltasNoNulas=v.g+v.f; const pa=resueltasNoNulas? v.g/resueltasNoNulas*100:0; const roiC=v.apostado? v.gp/v.apostado*100:0;
    const sample=v.n<10? ` <span class="tooltip-i" title="Muestra pequeña (${v.n} apuestas). No saques conclusiones definitivas todavía.">i</span>`:'';
    return `<tr><td>${esc(k)}${sample}</td><td>${v.n}</td><td class="pos">${v.g}</td><td class="neg">${v.f}</td><td>${fmtNum(pa,1)}%</td><td class="mono">${fmtMoney(v.apostado)}</td><td class="mono ${v.gp>=0?'pos':'neg'}">${fmtMoney(v.gp)}</td><td class="${roiC>=0?'pos':'neg'}">${fmtPct(roiC)}</td><td class="mono">${fmtNum(v.cuotas/v.n)}</td></tr>`;
  }).join('') : `<tr><td colspan="9"><div class="empty">Sin datos suficientes.</div></td></tr>`}
  </tbody></table></div>`;
}
function cuotaRangeLabel(c){
  if(c<1.5) return '1.01–1.49'; if(c<1.8) return '1.50–1.79'; if(c<2.0) return '1.80–1.99';
  if(c<2.5) return '2.00–2.49'; if(c<3.0) return '2.50–2.99'; return '3.00+';
}
function renderAnalisis(el){
  const byDeporte=groupBy(b=>b.deporte);
  const byMercado=groupBy(b=>b.mercado);
  const byCasa=groupBy(b=>b.casa);
  const byCuota=groupBy(b=>cuotaRangeLabel(Number(b.cuota)));
  const byTipo=groupBy(b=>b.tipo);
  const byDia=groupBy(b=>new Date(b.fecha+'T00:00:00').toLocaleDateString('es-CO',{weekday:'long'}));
  const byLiga=groupBy(b=>b.liga||'Sin especificar');

  // Detección automática
  const insights=[];
  const bestSport=Object.entries(byDeporte).sort((a,b)=>b[1].gp-a[1].gp)[0];
  if(bestSport) insights.push(`📈 El deporte con mejor rendimiento es <b>${esc(bestSport[0])}</b> (${fmtMoney(bestSport[1].gp)}).`);
  const worstMarket=Object.entries(byMercado).sort((a,b)=>a[1].gp-b[1].gp)[0];
  if(worstMarket && worstMarket[1].gp<0) insights.push(`📉 El mercado <b>${esc(worstMarket[0])}</b> muestra pérdidas recurrentes (${fmtMoney(worstMarket[1].gp)}).`);
  const bestOddRange=Object.entries(byCuota).sort((a,b)=>b[1].gp-a[1].gp)[0];
  if(bestOddRange) insights.push(`🎯 El rango de cuotas <b>${bestOddRange[0]}</b> presenta el mejor resultado acumulado.`);
  const maxStake=Math.max(0,...DATA.bets.map(b=>Number(b.stake)||0));
  const avgStake=totalApostado()/(apuestasResueltas().length||1);
  if(maxStake>avgStake*3) insights.push(`⚠️ Se detectó al menos un stake muy superior al promedio (${fmtMoney(maxStake)} vs. promedio ${fmtMoney(avgStake)}). Revisa si fue una desviación de tu plan de gestión.`);
  const top3Share=(()=>{ const sorted=[...apuestasResueltas()].sort((a,b)=>(b.gananciaNeta||0)-(a.gananciaNeta||0)).slice(0,3); const s=sorted.reduce((s,b)=>s+Math.max(0,b.gananciaNeta||0),0); return totalGanado()? s/totalGanado()*100:0; })();
  if(top3Share>50) insights.push(`⚠️ El ${fmtNum(top3Share,0)}% de tus ganancias proviene de solo 3 apuestas. Hay dependencia de pocos resultados ganadores.`);

  el.innerHTML=`
  <div class="section-title">Detección automática</div>
  ${insights.length? insights.map(i=>`<div class="alert alert-info">${i}</div>`).join('') : `<div class="empty">Registra más apuestas para obtener detección automática de patrones.</div>`}
  ${analysisTable('Por deporte',byDeporte)}
  ${analysisTable('Por mercado',byMercado)}
  ${analysisTable('Por liga / competición',byLiga)}
  ${analysisTable('Por casa de apuestas',byCasa)}
  ${analysisTable('Por rango de cuota',byCuota)}
  ${analysisTable('Por tipo de apuesta',byTipo)}
  ${analysisTable('Por día de la semana',byDia)}
  `;
}

/* ============================= RIESGO ============================= */
function renderRiesgo(el){
  const c=DATA.config; const ba=bankrollActual();
  const pendientes=DATA.bets.filter(b=>b.estado==='pendiente');
  const today=todayStr();
  const perdidaHoy=DATA.bets.filter(b=>(b.fechaResolucion||b.fecha)===today && b.estado!=='pendiente').reduce((s,b)=>s+Math.min(0,b.gananciaNeta||0),0);
  const weekAgo=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  const perdidaSemana=DATA.bets.filter(b=>(b.fechaResolucion||b.fecha)>=weekAgo && b.estado!=='pendiente').reduce((s,b)=>s+Math.min(0,b.gananciaNeta||0),0);
  const dd=maxDrawdown();
  const rachaP=rachaActualPerdidas();
  const eventCounts={}; pendientes.forEach(b=>{ eventCounts[b.evento]=(eventCounts[b.evento]||0)+1; });
  const concentrado=Object.entries(eventCounts).filter(([k,v])=>v>1);

  const alerts=[];
  const lastBig=DATA.bets.filter(b=>Number(b.stake)/ba*100>Number(c.limiteApuestaPct)).slice(-1)[0];
  if(lastBig) alerts.push(['danger',`Se registró una apuesta que supera el límite máximo configurado por apuesta (${c.limiteApuestaPct}% del bankroll).`]);
  if(Math.abs(perdidaHoy)/ba*100 >= Number(c.limitePerdidaDiariaPct)) alerts.push(['danger',`Se alcanzó el límite de pérdida diaria configurado (${c.limitePerdidaDiariaPct}%).`]);
  if(Math.abs(perdidaSemana)/ba*100 >= Number(c.limitePerdidaSemanalPct)) alerts.push(['danger',`Se alcanzó el límite de pérdida semanal configurado (${c.limitePerdidaSemanalPct}%).`]);
  if(dd.maxDDpct >= Number(c.drawdownAlertaPct)) alerts.push(['warn',`El drawdown actual (${fmtNum(dd.maxDDpct,1)}%) supera el nivel configurado de alerta (${c.drawdownAlertaPct}%).`]);
  if(rachaP >= Number(c.rachaPerdidasAlerta)) alerts.push(['warn',`Racha de ${rachaP} pérdidas consecutivas. Considera pausar y revisar tu proceso antes de seguir apostando.`]);
  if(concentrado.length) alerts.push(['warn',`Hay ${concentrado.length} evento(s) con más de una apuesta pendiente relacionada: ${concentrado.map(c=>esc(c[0])).join(', ')}.`]);
  if(rachaP>=2) alerts.push(['info','Mensaje preventivo: evita perseguir pérdidas aumentando el stake por impulso. Respeta tu plan de gestión incluso después de una racha negativa (tilt).']);

  el.innerHTML=`
  <div class="grid grid-4">
    ${kpi('Capital expuesto (pendientes)',fmtMoney(bankrollComprometido()))}
    ${kpi('% arriesgado hoy',fmtNum(Math.abs(perdidaHoy)/ba*100,1)+'%')}
    ${kpi('% arriesgado esta semana',fmtNum(Math.abs(perdidaSemana)/ba*100,1)+'%')}
    ${kpi('Apuestas pendientes simultáneas',pendientes.length)}
    ${kpi('Stake máximo histórico',fmtMoney(Math.max(0,...DATA.bets.map(b=>Number(b.stake)||0))))}
    ${kpi('Racha de pérdidas actual',rachaP)}
    ${kpi('Drawdown actual',fmtPct(-dd.maxDDpct))}
    ${kpi('Riesgo concentrado (eventos)',concentrado.length)}
  </div>
  <div class="section-title">Límites configurados</div>
  <div class="card grid grid-3">
    <div>Máximo por apuesta<div class="risk-bar"><div class="risk-bar-fill" style="width:${Math.min(100,c.limiteApuestaPct*4)}%;background:var(--gold);"></div></div><div style="margin-top:4px;" class="mono">${c.limiteApuestaPct}% del bankroll</div></div>
    <div>Pérdida diaria máxima<div class="risk-bar"><div class="risk-bar-fill" style="width:${Math.min(100,Math.abs(perdidaHoy)/ba*100/c.limitePerdidaDiariaPct*100)}%;background:var(--warn);"></div></div><div style="margin-top:4px;" class="mono">${c.limitePerdidaDiariaPct}% del bankroll</div></div>
    <div>Pérdida semanal máxima<div class="risk-bar"><div class="risk-bar-fill" style="width:${Math.min(100,Math.abs(perdidaSemana)/ba*100/c.limitePerdidaSemanalPct*100)}%;background:var(--neg);"></div></div><div style="margin-top:4px;" class="mono">${c.limitePerdidaSemanalPct}% del bankroll</div></div>
  </div>
  <div class="section-title">Alertas activas</div>
  ${alerts.length? alerts.map(a=>`<div class="alert alert-${a[0]}">${a[1]}</div>`).join('') : `<div class="alert alert-info">No hay alertas activas por el momento. Tu operación está dentro de los límites configurados.</div>`}
  `;
}

/* ============================= DIARIO ============================= */
function renderDiario(el){
  el.innerHTML=`<div class="btn-row" style="margin-bottom:12px;"><button class="btn btn-gold" id="addDiary">+ Nueva entrada</button></div>
  <div id="diaryList"></div>`;

  const entries=[...DATA.diary].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  list.innerHTML=entries.length? entries.map(d=>`
    <div class="card" style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;">
        <b>${fmtDate(d.fecha)}</b>
        <div class="btn-row"><button class="btn btn-sm" data-editd="${d.id}">Editar</button><button class="btn btn-sm btn-danger" data-deld="${d.id}">Eliminar</button></div>
      </div>
      <div style="margin-top:6px;color:var(--muted);font-size:12px;">Estado emocional: <b class="gold-c">${esc(d.estadoEmocional)}</b> · Confianza: <b>${esc(d.confianza)}/10</b></div>
      ${d.objetivo?`<div style="margin-top:6px;"><b>Objetivo:</b> ${esc(d.objetivo)}</div>`:''}
      ${d.analisisPrevio?`<div><b>Análisis previo:</b> ${esc(d.analisisPrevio)}</div>`:''}
      ${d.errores?`<div><b>Errores:</b> ${esc(d.errores)}</div>`:''}
      ${d.aprendizajes?`<div><b>Aprendizajes:</b> ${esc(d.aprendizajes)}</div>`:''}
      ${d.cambios?`<div><b>Cambios a implementar:</b> ${esc(d.cambios)}</div>`:''}
      ${d.comentarios?`<div><b>Comentarios:</b> ${esc(d.comentarios)}</div>`:''}
    </div>`).join('') : `<div class="empty">Aún no tienes entradas en el diario.</div>`;
  list.querySelectorAll('[data-editd]').forEach(b=>b.addEventListener('click',()=>openDiaryModal(b.dataset.editd)));
  list.querySelectorAll('[data-deld]').forEach(b=>b.addEventListener('click',()=>{ DATA.diary=DATA.diary.filter(d=>d.id!==b.dataset.deld); saveData(); render(); }));
}
function openDiaryModal(id){
  const editing=id? DATA.diary.find(d=>d.id===id):null;
  const d=editing||{id:uid(),fecha:todayStr(),estadoEmocional:'Tranquilo',confianza:7,objetivo:'',analisisPrevio:'',errores:'',aprendizajes:'',cambios:'',comentarios:''};
  const body=document.getElementById('modalBody');
  body.innerHTML=`<button class="modal-close" id="closeModal">✕</button><h2>${editing?'Editar entrada':'Nueva entrada del diario'}</h2>
  <form id="diaryForm">
    <div class="grid grid-2">
      <div class="field"><label>Fecha</label><input type="date" name="fecha" value="${d.fecha}" required></div>
      <div class="field"><label>Estado emocional</label><input name="estadoEmocional" value="${esc(d.estadoEmocional)}"></div>
      <div class="field"><label>Nivel de confianza (1-10)</label><input type="number" min="1" max="10" name="confianza" value="${d.confianza}"></div>
      <div class="field"><label>Objetivo del día</label><input name="objetivo" value="${esc(d.objetivo)}"></div>
    </div>
    <div class="field"><label>Análisis previo</label><textarea name="analisisPrevio" rows="2">${esc(d.analisisPrevio)}</textarea></div>
    <div class="field"><label>Errores cometidos</label><textarea name="errores" rows="2">${esc(d.errores)}</textarea></div>
    <div class="field"><label>Aprendizajes</label><textarea name="aprendizajes" rows="2">${esc(d.aprendizajes)}</textarea></div>
    <div class="field"><label>Cambios a implementar</label><textarea name="cambios" rows="2">${esc(d.cambios)}</textarea></div>
    <div class="field"><label>Comentarios posteriores a resultados</label><textarea name="comentarios" rows="2">${esc(d.comentarios)}</textarea></div>
    <div class="btn-row"><button class="btn btn-gold" type="submit">Guardar</button><button class="btn" type="button" id="cancelD">Cancelar</button></div>
  </form>`;
  document.getElementById('overlay').classList.add('active');
  document.getElementById('closeModal').onclick=closeModal;
  document.getElementById('cancelD').onclick=closeModal;
  document.getElementById('diaryForm').addEventListener('submit',e=>{
    e.preventDefault(); const fd=new FormData(e.target); const nd={...d};
    for(const [k,v] of fd.entries()) nd[k]=v;
    if(editing){ const idx=DATA.diary.findIndex(x=>x.id===id); DATA.diary[idx]=nd; } else DATA.diary.push(nd);
    saveData(); closeModal(); render(); toast('Entrada guardada');
  });
}

/* ============================= REPORTES ============================= */
function renderReportes(el){
  el.innerHTML=`
  <div class="card">
    <div class="grid grid-3">
      <div class="field"><label>Tipo de período</label><select id="repType">
        <option value="7">Última semana</option><option value="30" selected>Último mes</option><option value="90">Último trimestre</option><option value="365">Último año</option><option value="custom">Rango personalizado</option>
      </select></div>
      <div class="field" id="repFromWrap" style="display:none"><label>Desde</label><input type="date" id="repFrom"></div>
      <div class="field" id="repToWrap" style="display:none"><label>Hasta</label><input type="date" id="repTo"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-gold" id="genRep">Generar reporte</button>
      <button class="btn" id="expCSV">Exportar apuestas CSV</button>
      <button class="btn" id="expMovCSV">Exportar movimientos CSV</button>
      <button class="btn" id="expPublic">Copiar resumen público (sin bankroll)</button>
    </div>
  </div>
  <div id="repOutput" style="margin-top:16px;"></div>`;
  const typeSel=el.querySelector('#repType');
  typeSel.addEventListener('change',()=>{
    const custom=typeSel.value==='custom';
    el.querySelector('#repFromWrap').style.display=custom?'':'none';
    el.querySelector('#repToWrap').style.display=custom?'':'none';
  });
  el.querySelector('#genRep').addEventListener('click',()=>generateReport(el));
  el.querySelector('#expCSV').addEventListener('click',exportBetsCSV);
  el.querySelector('#expMovCSV').addEventListener('click',exportMovementsCSV);
  el.querySelector('#expPublic').addEventListener('click',()=>generateReport(el,true));
}
function repRangeDates(el){
  const t=el.querySelector('#repType').value;
  if(t==='custom') return {from:el.querySelector('#repFrom').value||'0000-00-00', to:el.querySelector('#repTo').value||todayStr()};
  const d=new Date(Date.now()-Number(t)*86400000);
  return {from:d.toISOString().slice(0,10), to:todayStr()};
}
function generateReport(el,publicMode=false){
  const {from,to}=repRangeDates(el);
  const bets=DATA.bets.filter(b=>b.fecha>=from && b.fecha<=to);
  const resueltas=bets.filter(b=>b.estado!=='pendiente');
  const apostado=resueltas.reduce((s,b)=>s+Number(b.stake),0);
  const gp=resueltas.reduce((s,b)=>s+(b.gananciaNeta||0),0);
  const roiP=apostado? gp/apostado*100:0;
  const vu=valorUnidadActual();
  const yieldP=apostado? (gp/vu)/(apostado/vu)*100:0;
  const noNulas=resueltas.filter(b=>b.estado!=='nula');
  const ganadas=noNulas.filter(b=>(b.gananciaNeta||0)>0);
  const acierto=noNulas.length? ganadas.length/noNulas.length*100:0;
  const mejor=resueltas.length? resueltas.reduce((a,b)=>(b.gananciaNeta||0)>(a.gananciaNeta||0)?b:a):null;
  const peor=resueltas.length? resueltas.reduce((a,b)=>(b.gananciaNeta||0)<(a.gananciaNeta||0)?b:a):null;
  const bmDep=Object.entries(groupBy(b=>b.deporte)).filter(([k])=>bets.some(b=>b.deporte===k));
  const bestDep=bmDep.sort((a,b)=>b[1].gp-a[1].gp)[0];
  const worstDep=bmDep.sort((a,b)=>a[1].gp-b[1].gp)[0];
  const conclusiones=[];
  conclusiones.push(gp>=0? 'El período analizado cerró en positivo, manteniendo la estrategia dentro del plan de gestión de bankroll.' : 'El período analizado cerró en negativo; se recomienda revisar el diario y las categorías con peor rendimiento antes de aumentar el stake.');
  if(acierto<45) conclusiones.push('El porcentaje de acierto está por debajo del 45%, conviene revisar la selección de mercados y cuotas.');
  if(resueltas.length<15) conclusiones.push('La muestra de este período es reducida; las conclusiones deben tomarse con cautela.');

  const html=`
  <div class="card">
    <h3>Reporte ${publicMode?'público':'interno'} · ${fmtDate(from)} — ${fmtDate(to)}</h3>
    <div class="grid grid-4" style="margin-top:12px;">
      ${!publicMode?kpi('Bankroll inicial del período',fmtMoney(DATA.config.bankrollInicial)):''}
      ${!publicMode?kpi('Bankroll final',fmtMoney(bankrollActual())):''}
      ${kpi('Total apostado',fmtMoney(apostado))}
      ${kpi('Ganancia/pérdida neta',fmtMoney(gp),gp>=0?'pos':'neg')}
      ${kpi('ROI',fmtPct(roiP))}
      ${kpi('Yield',fmtPct(yieldP))}
      ${kpi('% Acierto',fmtNum(acierto,1)+'%')}
      ${kpi('Unidades G/P',fmtNum(gp/vu)+' u')}
    </div>
    <div class="section-title">Detalle</div>
    <p>Mejor apuesta: ${mejor?esc(mejor.evento)+' ('+fmtMoney(mejor.gananciaNeta)+')':'—'}</p>
    <p>Peor apuesta: ${peor?esc(peor.evento)+' ('+fmtMoney(peor.gananciaNeta)+')':'—'}</p>
    <p>Mejor deporte: ${bestDep?esc(bestDep[0]):'—'} · Peor deporte: ${worstDep?esc(worstDep[0]):'—'}</p>
    <div class="section-title">Conclusiones automáticas</div>
    ${conclusiones.map(c=>`<div class="alert alert-info">${c}</div>`).join('')}
  </div>`;
  document.getElementById('repOutput').innerHTML=html;
  if(publicMode) toast('Resumen público generado (bankroll oculto)');
}
function toCSV(rows,headers){
  const esc2=v=>{ if(v===null||v===undefined) return ''; const s=String(v).replace(/"/g,'""'); return /[",\n]/.test(s)?`"${s}"`:s; };
  return headers.join(',')+'\n'+rows.map(r=>headers.map(h=>esc2(r[h])).join(',')).join('\n');
}
function downloadFile(name,content,type='text/csv'){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
}
function exportBetsCSV(){
  const headers=['id','fecha','hora','deporte','liga','evento','mercado','seleccion','casa','cuota','stake','tipo','categoria','estado','gananciaNeta','retornoTotal','fechaResolucion','publicado','cuotaCierre'];
  downloadFile('apuestas.csv', toCSV(DATA.bets,headers)); toast('CSV de apuestas descargado');
}
function exportMovementsCSV(){
  downloadFile('movimientos.csv', toCSV(DATA.movements,['id','fecha','tipo','monto','nota'])); toast('CSV de movimientos descargado');
}

/* ============================= CONFIG ============================= */
function renderConfig(el){
  const c=DATA.config;
  el.innerHTML=`
  <div class="card">
    <div class="section-title">Datos del proyecto</div>
    <div class="grid grid-3">
      <div class="field"><label>Nombre del proyecto</label><input id="c_nombre" value="${esc(c.nombre)}"></div>
      <div class="field"><label>Moneda</label><select id="c_moneda">${['COP','USD','EUR'].map(m=>`<option ${c.moneda===m?'selected':''}>${m}</option>`).join('')}</select></div>
      <div class="field"><label>Fecha de inicio</label><input type="date" id="c_fechaInicio" value="${c.fechaInicio}"></div>
      <div class="field"><label>Bankroll inicial</label><input type="number" id="c_bankrollInicial" value="${c.bankrollInicial}"></div>
      <div class="field"><label>Bankroll objetivo</label><input type="number" id="c_bankrollObjetivo" value="${c.bankrollObjetivo}"></div>
      <div class="field"><label>Método de unidad</label><select id="c_metodoUnidad"><option value="fijo" ${c.metodoUnidad==='fijo'?'selected':''}>Valor fijo</option><option value="porcentaje" ${c.metodoUnidad==='porcentaje'?'selected':''}>Porcentaje del bankroll</option></select></div>
      <div class="field"><label>Valor fijo de 1 unidad</label><input type="number" id="c_valorUnidad" value="${c.valorUnidad}"></div>
      <div class="field"><label>% del bankroll = 1 unidad</label><input type="number" step="0.1" id="c_porcentajeUnidad" value="${c.porcentajeUnidad}"></div>
    </div>
    <div class="section-title">Límites de riesgo</div>
    <div class="grid grid-3">
      <div class="field"><label>Límite máx. por apuesta (% bankroll)</label><input type="number" id="c_limiteApuestaPct" value="${c.limiteApuestaPct}"></div>
      <div class="field"><label>Límite pérdida diaria (%)</label><input type="number" id="c_limitePerdidaDiariaPct" value="${c.limitePerdidaDiariaPct}"></div>
      <div class="field"><label>Límite pérdida semanal (%)</label><input type="number" id="c_limitePerdidaSemanalPct" value="${c.limitePerdidaSemanalPct}"></div>
      <div class="field"><label>Alerta de drawdown (%)</label><input type="number" id="c_drawdownAlertaPct" value="${c.drawdownAlertaPct}"></div>
      <div class="field"><label>Alerta de racha de pérdidas</label><input type="number" id="c_rachaPerdidasAlerta" value="${c.rachaPerdidasAlerta}"></div>
    </div>
    <div class="section-title">Deportes analizados</div>
    <div class="pill-list" id="deportesPills"></div>
    <div class="btn-row" style="margin-top:8px;"><input type="text" id="newDeporte" placeholder="Agregar deporte…" style="max-width:220px;"><button class="btn btn-sm" id="addDeporte">Agregar</button></div>
    <div class="section-title">Casas de apuestas</div>
    <div class="pill-list" id="casasPills"></div>
    <div class="btn-row" style="margin-top:8px;"><input type="text" id="newCasa" placeholder="Agregar casa…" style="max-width:220px;"><button class="btn btn-sm" id="addCasa">Agregar</button></div>
    <div class="btn-row" style="margin-top:22px;">
      <button class="btn btn-gold" id="saveConfig">Guardar configuración</button>
      <button class="btn" id="importBtn">Importar datos (JSON)</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
      <button class="btn btn-danger" id="clearDemo">${DATA.ui.demoSeeded? 'Eliminar datos de demostración':'Reiniciar todos los datos'}</button>
    </div>
  </div>`;
  renderPills();
  function renderPills(){
    el.querySelector('#deportesPills').innerHTML=c.deportes.map((d,i)=>`<span class="pill-x">${esc(d)}<button data-rmdep="${i}">✕</button></span>`).join('');
    el.querySelector('#casasPills').innerHTML=c.casas.map((cs,i)=>`<span class="pill-x">${esc(cs)}<button data-rmcasa="${i}">✕</button></span>`).join('');
    el.querySelectorAll('[data-rmdep]').forEach(b=>b.addEventListener('click',()=>{ c.deportes.splice(+b.dataset.rmdep,1); renderPills(); }));
    el.querySelectorAll('[data-rmcasa]').forEach(b=>b.addEventListener('click',()=>{ c.casas.splice(+b.dataset.rmcasa,1); renderPills(); }));
  }
  el.querySelector('#addDeporte').addEventListener('click',()=>{ const v=el.querySelector('#newDeporte').value.trim(); if(v){c.deportes.push(v); el.querySelector('#newDeporte').value=''; renderPills();} });
  el.querySelector('#addCasa').addEventListener('click',()=>{ const v=el.querySelector('#newCasa').value.trim(); if(v){c.casas.push(v); el.querySelector('#newCasa').value=''; renderPills();} });
  el.querySelector('#saveConfig').addEventListener('click',()=>{
    c.nombre=el.querySelector('#c_nombre').value; c.moneda=el.querySelector('#c_moneda').value;
    c.fechaInicio=el.querySelector('#c_fechaInicio').value; c.bankrollInicial=Number(el.querySelector('#c_bankrollInicial').value);
    c.bankrollObjetivo=Number(el.querySelector('#c_bankrollObjetivo').value); c.metodoUnidad=el.querySelector('#c_metodoUnidad').value;
    c.valorUnidad=Number(el.querySelector('#c_valorUnidad').value); c.porcentajeUnidad=Number(el.querySelector('#c_porcentajeUnidad').value);
    c.limiteApuestaPct=Number(el.querySelector('#c_limiteApuestaPct').value); c.limitePerdidaDiariaPct=Number(el.querySelector('#c_limitePerdidaDiariaPct').value);
    c.limitePerdidaSemanalPct=Number(el.querySelector('#c_limitePerdidaSemanalPct').value); c.drawdownAlertaPct=Number(el.querySelector('#c_drawdownAlertaPct').value);
    c.rachaPerdidasAlerta=Number(el.querySelector('#c_rachaPerdidasAlerta').value);
    saveData(); render(); toast('Configuración guardada');
  });
  el.querySelector('#clearDemo').addEventListener('click',()=>{ if(confirm('¿Seguro que deseas eliminar todos los datos y reiniciar el proyecto?')) clearDemoData(); });
  el.querySelector('#importBtn').addEventListener('click',()=>el.querySelector('#importFile').click());
  el.querySelector('#importFile').addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{ const imported=JSON.parse(ev.target.result);
        if(imported.bets && Array.isArray(imported.bets)){ DATA=imported; saveData(); render(); toast('Datos importados correctamente'); }
        else toast('⚠️ El archivo no tiene el formato esperado');
      }catch(err){ toast('⚠️ Error al leer el archivo JSON'); }
    };
    reader.readAsText(file);
  });
}

/* ============================= BACKUP ============================= */
function doBackup(){
  downloadFile('backup-bankroll-'+todayStr()+'.json', JSON.stringify(DATA,null,2), 'application/json');
  toast('Copia de seguridad descargada');
}

/* ============================= INIT ============================= */
async function init(){
  await loadData();
  document.body.setAttribute('data-theme',DATA.ui.theme||'dark');
  document.getElementById('themeToggle').textContent=(DATA.ui.theme==='light')? '☀️ Modo claro':'🌙 Modo oscuro';
  document.getElementById('loadingScreen').style.display='none';
  document.getElementById('appRoot').classList.remove('hidden');
  render();
}
document.getElementById('menuBtn').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('open'));
document.getElementById('themeToggle').addEventListener('click',()=>{
  DATA.ui.theme=(DATA.ui.theme==='light')?'dark':'light';
  document.body.setAttribute('data-theme',DATA.ui.theme);
  document.getElementById('themeToggle').textContent=(DATA.ui.theme==='light')? '☀️ Modo claro':'🌙 Modo oscuro';
  saveData();
  Object.values(CHARTS).forEach(ch=>ch&&ch.destroy()); CHARTS={};
  render();
});
document.getElementById('btnNewBet').addEventListener('click',()=>openBetModal());
document.getElementById('btnBackup').addEventListener('click',doBackup);
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeModal(); });
init();
</script>
